publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  iconify_flutter: ^0.0.7
  http: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
