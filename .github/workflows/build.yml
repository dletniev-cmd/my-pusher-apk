# Положи этот файл в репозиторий по пути: .github/workflows/build.yml
#
# Что он делает:
#  1. На каждый push в main — собирает release APK для Android.
#  2. Сохраняет APK как artifact (можно скачать прямо со страницы запуска).
#  3. Если push был с тегом вида v1.0.0 — создаёт GitHub Release и кладёт APK туда.
#
# Как пользоваться:
#  - Просто пушишь код → через 5-7 минут на вкладке Actions появится сборка с APK.
#  - Чтобы создать Release с APK: git tag v1.0.0 && git push origin v1.0.0

name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch: # позволяет запускать вручную из UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          flutter-version: '3.19.0' # or higher

      - name: Show versions
        run: |
          flutter --version
          java -version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze (не падать на warnings)
        run: flutter analyze || true

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Rename APK files
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk           artifacts/github-pusher-universal.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk artifacts/github-pusher-arm64-v8a.apk    || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/github-pusher-armeabi-v7a.apk || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk    artifacts/github-pusher-x86_64.apk       || true
          ls -la artifacts/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pusher-apk-${{ github.run_number }}
          path: artifacts/*.apk
          retention-days: 30

      # ── Создание GitHub Release при пуше тега vX.X.X ─────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
